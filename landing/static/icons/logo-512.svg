<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="li512_marineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0190e0"/>
      <stop offset="100%" style="stop-color:#016fb9"/>
    </linearGradient>
    <linearGradient id="li512_bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d38"/>
      <stop offset="100%" style="stop-color:#353531"/>
    </linearGradient>
    <filter id="li512_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="li512_warmGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="li512_brainGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="256.0" cy="256.0" r="256.0" fill="url(#li512_bgGradient)"/>
  <g transform="translate(256.0, 256.0) scale(1.0000)">
    <!-- Outer orbital rings -->
    <circle cx="0" cy="0" r="165" fill="none" stroke="#016fb9" stroke-width="2" opacity="0.2"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#016fb9" stroke-width="1.5" opacity="0.12"/>
    <!-- Central brain hub -->
    <circle cx="0" cy="0" r="65" fill="url(#li512_marineGradient)" filter="url(#li512_glow)"/>
    <!-- Stylized Brain Icon -->
    <g filter="url(#li512_brainGlow)">
      <!-- Left hemisphere -->
      <path d="M-6 -42 C-22 -42 -36 -32 -40 -16 C-44 0 -40 16 -32 28 C-26 36 -18 42 -8 44 C-4 44 -2 42 0 40"
            fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Right hemisphere -->
      <path d="M6 -42 C22 -42 36 -32 40 -16 C44 0 40 16 32 28 C26 36 18 42 8 44 C4 44 2 42 0 40"
            fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Brain stem -->
      <path d="M0 40 L0 50" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <!-- Left hemisphere folds -->
      <path d="M-34 -20 C-26 -26 -18 -20 -14 -10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
      <path d="M-36 4 C-28 -2 -20 4 -16 12" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
      <path d="M-30 22 C-22 18 -16 24 -12 32" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
      <!-- Right hemisphere folds -->
      <path d="M34 -20 C26 -26 18 -20 14 -10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
      <path d="M36 4 C28 -2 20 4 16 12" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
      <path d="M30 22 C22 18 16 24 12 32" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
      <!-- Corpus callosum -->
      <line x1="0" y1="-38" x2="0" y2="36" stroke="#ffffff" stroke-width="2" opacity="0.35"/>
    </g>

    <!-- Top -->
    <line x1="0" y1="-65" x2="0" y2="-100" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-120" r="22" fill="#ff9505" filter="url(#li512_warmGlow)"/>
    <circle cx="0" cy="-120" r="8" fill="#ffffff" opacity="0.9"/>
    <!-- Top Right -->
    <line x1="46" y1="-46" x2="72" y2="-72" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="85" cy="-85" r="18" fill="#016fb9" filter="url(#li512_glow)"/>
    <circle cx="85" cy="-85" r="6" fill="#ffffff" opacity="0.9"/>
    <!-- Right -->
    <line x1="65" y1="0" x2="100" y2="0" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="120" cy="0" r="22" fill="#ec4e20" filter="url(#li512_warmGlow)"/>
    <circle cx="120" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <!-- Bottom Right -->
    <line x1="46" y1="46" x2="72" y2="72" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="85" cy="85" r="18" fill="#016fb9" filter="url(#li512_glow)"/>
    <circle cx="85" cy="85" r="6" fill="#ffffff" opacity="0.9"/>
    <!-- Bottom -->
    <line x1="0" y1="65" x2="0" y2="100" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="120" r="22" fill="#ff9505" filter="url(#li512_warmGlow)"/>
    <circle cx="0" cy="120" r="8" fill="#ffffff" opacity="0.9"/>
    <!-- Bottom Left -->
    <line x1="-46" y1="46" x2="-72" y2="72" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-85" cy="85" r="18" fill="#016fb9" filter="url(#li512_glow)"/>
    <circle cx="-85" cy="85" r="6" fill="#ffffff" opacity="0.9"/>
    <!-- Left -->
    <line x1="-65" y1="0" x2="-100" y2="0" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-120" cy="0" r="22" fill="#ec4e20" filter="url(#li512_warmGlow)"/>
    <circle cx="-120" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <!-- Top Left -->
    <line x1="-46" y1="-46" x2="-72" y2="-72" stroke="#016fb9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-85" cy="-85" r="18" fill="#016fb9" filter="url(#li512_glow)"/>
    <circle cx="-85" cy="-85" r="6" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
