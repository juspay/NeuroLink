<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a27"/>
      <stop offset="50%" style="stop-color:#353531"/>
      <stop offset="100%" style="stop-color:#2a2a27"/>
    </linearGradient>
    <linearGradient id="marineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0190e0"/>
      <stop offset="100%" style="stop-color:#016fb9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Background neural pattern -->
  <g opacity="0.08">
    <line x1="0" y1="80" x2="280" y2="315" stroke="#016fb9" stroke-width="2"/>
    <line x1="0" y1="550" x2="250" y2="315" stroke="#016fb9" stroke-width="2"/>
    <line x1="1200" y1="60" x2="920" y2="315" stroke="#016fb9" stroke-width="2"/>
    <line x1="1200" y1="570" x2="950" y2="315" stroke="#016fb9" stroke-width="2"/>
  </g>
  
  <!-- Center content -->
  <g transform="translate(600, 260)">
    <!-- Brain symbol -->
    <circle cx="0" cy="0" r="85" fill="url(#marineGrad)" filter="url(#glow)"/>
    
    <!-- Brain icon -->
    <g>
      <path d="M-8 -55 C-28 -55 -48 -42 -52 -20 C-56 2 -50 22 -40 36 C-32 46 -22 54 -10 56 C-5 56 -2 53 0 50" 
            fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 -55 C28 -55 48 -42 52 -20 C56 2 50 22 40 36 C32 46 22 54 10 56 C5 56 2 53 0 50" 
            fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M0 50 L0 65" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M-44 -25 C-34 -34 -24 -25 -18 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M-46 10 C-36 2 -26 10 -20 22" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M44 -25 C34 -34 24 -25 18 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M46 10 C36 2 26 10 20 22" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="0" y1="-50" x2="0" y2="45" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Wordmark -->
  <text x="600" y="420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="800" fill="#ffffff" text-anchor="middle">
    Neuro<tspan fill="#ff9505">Link</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="500" fill="#94A3B8" text-anchor="middle">
    The AI-native TypeScript SDK for building intelligent applications
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(600, 530)">
    <rect x="-220" y="0" width="130" height="36" rx="18" fill="rgba(1, 111, 185, 0.35)" stroke="#016fb9" stroke-width="1.5"/>
    <text x="-155" y="24" font-family="system-ui" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Multi-Provider</text>
    
    <rect x="-70" y="0" width="100" height="36" rx="18" fill="rgba(255, 149, 5, 0.35)" stroke="#ff9505" stroke-width="1.5"/>
    <text x="-20" y="24" font-family="system-ui" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">MCP Ready</text>
    
    <rect x="50" y="0" width="115" height="36" rx="18" fill="rgba(236, 78, 32, 0.35)" stroke="#ec4e20" stroke-width="1.5"/>
    <text x="107" y="24" font-family="system-ui" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Open Source</text>
  </g>
  
  <!-- By Juspay -->
  <text x="600" y="600" font-family="system-ui" font-size="14" font-weight="400" fill="#64748B" text-anchor="middle">
    Open Source by Juspay
  </text>
</svg>
